<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Video</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene
    webxr="optionalFeatures: hit-test, dom-overlay"
    renderer="colorManagement: true">

    <a-assets>
      <video id="myVideo" src="video.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <a-video
      id="videoPlane"
      src="#myVideo"
      position="0 1.5 -3"
      rotation="0 0 0"
      width="3"
      height="3">
    </a-video>

  </a-scene>
</body>
</html>
