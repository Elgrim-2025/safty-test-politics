<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>8th Wall Web: Video AR</title>
  <script src="//cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="//cdn.8thwall.com/web/landing-page/landing-page.js"></script>
  <script async src="//apps.8thwall.com/xrweb?appKey=XXXXX"></script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-assets>
      <!-- 동영상 파일 경로를 여기에 입력하세요 -->
      <video id="myVideo" src="video.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera id="camera" position="0 8 8" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-light type="ambient" intensity="0.7"></a-light>

    <!-- 동영상 패널: position으로 위치 고정, rotation으로 각도 조정 -->
    <!-- position="x y z" : x=좌우, y=높이, z=앞뒤(음수일수록 앞) -->
    <a-video
      id="videoPlane"
      src="#myVideo"
      class="cantap"
      position="0 1.5 -3"
      rotation="0 0 0"
      width="4"
      height="2.25"
      xrextras-hold-drag
      xrextras-pinch-scale>
    </a-video>

    <a-plane id="ground" rotation="-90 0 0" width="1000" height="1000" material="shader: shadow" shadow></a-plane>
  </a-scene>
</body>
</html>
