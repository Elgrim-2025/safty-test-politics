<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video AR</title>
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>
</head>

<body>
  <div id="ui-hint">
    <p>화면을 터치해주세요</p>
    <p>핀치로 크기 조절이 가능합니다</p>
  </div>
  <style>
    #ui-hint {
      position: fixed;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px 24px;
      border-radius: 16px;
      pointer-events: none;
      z-index: 999;
      line-height: 1.8;
    }
    #ui-hint.hidden {
      display: none;
    }
  </style>
  <script src="bundle.js"></script>
  <script src="app.js"></script>
</body>

</html>
